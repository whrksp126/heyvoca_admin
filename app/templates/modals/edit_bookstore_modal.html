<div class="modal fade" id="editBookstoreModal" tabindex="-1" aria-labelledby="editBookstoreModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="editBookstoreModalLabel">북스토어 수정</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form id="editBookstoreForm">
          <input type="hidden" name="id" id="editBookstoreId">
          <div class="mb-3">
            <label for="editDisplayName" class="form-label">노출명 *</label>
            <input type="text" class="form-control" id="editDisplayName" name="name" required>
          </div>
          <div class="mb-3">
            <label class="form-label">카테고리</label>
            <select class="form-select" id="editCategoryId" name="category_id">
              <option value="">선택 안 함</option>
              {% for category in categories %}
              <option value="{{ category.id }}">{{ category.category }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="mb-3">
            <label for="editGem" class="form-label">보석</label>
            <input type="number" class="form-control" id="editGem" name="gem" min="0" value="0">
          </div>
          <div class="mb-3">
            <label class="form-label">색상 테마</label>
            <div class="d-flex gap-2 mt-1" id="editColorPalette">
              <div class="color-theme-swatch" data-main="#FF88DC" data-sub="#FFD7F3" data-bg="#FFEEFA" title="Pink">
                <div class="swatch-inner" style="background: linear-gradient(145deg, #FF88DC 55%, #FFEEFA 55%);"></div>
                <div class="swatch-check">✓</div>
              </div>
              <div class="color-theme-swatch" data-main="#9B8AFB" data-sub="#E9E6FF" data-bg="#F4F3FF" title="Purple">
                <div class="swatch-inner" style="background: linear-gradient(145deg, #9B8AFB 55%, #F4F3FF 55%);"></div>
                <div class="swatch-check">✓</div>
              </div>
              <div class="color-theme-swatch" data-main="#53B1FD" data-sub="#D1E9FF" data-bg="#EFF8FF" title="Blue">
                <div class="swatch-inner" style="background: linear-gradient(145deg, #53B1FD 55%, #EFF8FF 55%);"></div>
                <div class="swatch-check">✓</div>
              </div>
              <div class="color-theme-swatch" data-main="#34E8D9" data-sub="#C1FDF8" data-bg="#E8FDFB" title="Mint">
                <div class="swatch-inner" style="background: linear-gradient(145deg, #34E8D9 55%, #E8FDFB 55%);"></div>
                <div class="swatch-check">✓</div>
              </div>
              <div class="color-theme-swatch" data-main="#FFA602" data-sub="#FEEFC7" data-bg="#FFF8E5" title="Yellow">
                <div class="swatch-inner" style="background: linear-gradient(145deg, #FFA602 55%, #FFF8E5 55%);"></div>
                <div class="swatch-check">✓</div>
              </div>
            </div>
            <!-- 미리보기 카드 -->
            <div id="editColorPreviewCard" style="
              margin-top: 12px;
              border-radius: 14px;
              padding: 12px 16px;
              background-color: #FFEEFA;
              border: 1.5px solid #FFD7F3;
              display: flex;
              align-items: center;
              gap: 12px;
              transition: background-color 0.2s, border-color 0.2s;
            ">
              <div id="editPreviewDot" style="
                width: 36px; height: 36px;
                border-radius: 50%;
                background-color: #FF88DC;
                flex-shrink: 0;
                transition: background-color 0.2s;
              "></div>
              <div>
                <div id="editPreviewThemeName" style="font-weight: 700; font-size: 13px; color: #FF88DC; transition: color 0.2s;">Pink</div>
              </div>
            </div>
            <input type="hidden" id="editColorMain" name="color_main" value="#FF88DC">
            <input type="hidden" id="editColorSub" name="color_sub" value="#FFD7F3">
            <input type="hidden" id="editColorBackground" name="color_background" value="#FFEEFA">
          </div>
          <div class="mb-3">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="editIsVisible" name="is_visible">
              <label class="form-check-label" for="editIsVisible">
                공개
              </label>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
        <button type="submit" class="btn btn-primary" form="editBookstoreForm">저장</button>
      </div>
    </div>
  </div>
</div>

<script>
const EDIT_THEMES = [
  { main: "#FF88DC", sub: "#FFD7F3", bg: "#FFEEFA", name: "Pink" },
  { main: "#9B8AFB", sub: "#E9E6FF", bg: "#F4F3FF", name: "Purple" },
  { main: "#53B1FD", sub: "#D1E9FF", bg: "#EFF8FF", name: "Blue" },
  { main: "#34E8D9", sub: "#C1FDF8", bg: "#E8FDFB", name: "Mint" },
  { main: "#FFA602", sub: "#FEEFC7", bg: "#FFF8E5", name: "Yellow" },
];

function applyEditTheme(idx) {
  const theme = EDIT_THEMES[idx];
  document.getElementById('editColorMain').value = theme.main;
  document.getElementById('editColorSub').value = theme.sub;
  document.getElementById('editColorBackground').value = theme.bg;

  const card = document.getElementById('editColorPreviewCard');
  card.style.backgroundColor = theme.bg;
  card.style.borderColor = theme.sub;
  document.getElementById('editPreviewDot').style.backgroundColor = theme.main;
  document.getElementById('editPreviewThemeName').style.color = theme.main;
  document.getElementById('editPreviewThemeName').textContent = theme.name;

  document.querySelectorAll('#editColorPalette .color-theme-swatch').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });
}

document.querySelectorAll('#editColorPalette .color-theme-swatch').forEach((el, i) => {
  el.addEventListener('click', () => applyEditTheme(i));
});

// 수정 모달에서 데이터 로드
document.getElementById('editBookstoreModal').addEventListener('show.bs.modal', function (event) {
  const button = event.relatedTarget;
  const id = button.getAttribute('data-id');

  const row = button.closest('tr');
  const name = row.cells[0].textContent.trim();
  const isVisible = row.cells[3].textContent.trim() === '공개';
  const gem = row.cells[4].textContent.trim();
  const categoryId = row.getAttribute('data-category-id') || '';

  const colorBoxes = row.cells[7].querySelectorAll('div[data-color]');
  const mainColor = colorBoxes[0]?.getAttribute('data-color') || '#FF88DC';

  document.getElementById('editBookstoreId').value = id;
  document.getElementById('editDisplayName').value = name;
  document.getElementById('editGem').value = gem;
  document.getElementById('editIsVisible').checked = isVisible;
  document.getElementById('editCategoryId').value = categoryId;

  // 현재 main 색상과 가장 가까운 테마 선택
  const matchIdx = EDIT_THEMES.findIndex(t => t.main.toLowerCase() === mainColor.toLowerCase());
  applyEditTheme(matchIdx >= 0 ? matchIdx : 0);
});

// 수정 폼 제출
document.getElementById('editBookstoreForm').addEventListener('submit', async function(e) {
  e.preventDefault();

  const id = document.getElementById('editBookstoreId').value;
  const categoryId = document.getElementById('editCategoryId').value || null;

  const data = {
    name: document.getElementById('editDisplayName').value,
    category_id: categoryId ? parseInt(categoryId) : null,
    gem: parseInt(document.getElementById('editGem').value) || 0,
    color: {
      main: document.getElementById('editColorMain').value,
      sub: document.getElementById('editColorSub').value,
      background: document.getElementById('editColorBackground').value
    },
    is_visible: document.getElementById('editIsVisible').checked
  };

  try {
    const response = await fetch(`/bookstore/api/bookstore/${id}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });

    if (response.ok) {
      location.reload();
    } else {
      alert('수정에 실패했습니다.');
    }
  } catch (error) {
    console.error('Error:', error);
    alert('수정 중 오류가 발생했습니다.');
  }
});
</script>
