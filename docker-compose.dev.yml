services:
  admin:
    container_name: heyvoca_admin_dev
    image: heyvoca_admin:dev
    build:
      context: .
      dockerfile: Dockerfile
    command: gunicorn --reload -w 2 -b 0.0.0.0:5000 run:app
    env_file:
      - ./.env.dev
    volumes:
      - ./app:/app/app
      # 소스 reload 용으로 ./app 을 마운트하되, 이미지에 빌드된 SPA 산출물은
      # 익명 볼륨으로 보존(host 의 빈 app/static/spa 로 가려지지 않게)
      - /app/app/static/spa
      - ./application.py:/app/application.py
      - ./run.py:/app/run.py
      - ./config.py:/app/config.py
    networks:
      - heyvoca_dev_heyvoca_dev
      - nginx_proxy
    restart: always

networks:
  heyvoca_dev_heyvoca_dev:
    external: true
  nginx_proxy:
    external: true
